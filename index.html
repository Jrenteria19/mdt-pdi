<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDT | PDI de Chile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;800&display=swap"
        rel="stylesheet">

    <style>
        /* Paleta basada en la imagen: Azules oscuros, grises y blancos limpios */
        :root {
            --mdt-blue: #3b82f6;
            --mdt-bg: #0a0f18;
            --mdt-panel: rgba(16, 24, 39, 0.85);
            --mdt-border: rgba(255, 255, 255, 0.08);
            --mdt-text: #f8fafc;
            --mdt-text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #152033 0%, #050a12 100%);
            color: var(--mdt-text);
            font-family: 'Rajdhani', 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Watermark Seal in Background */
        body::after {
            content: "";
            position: absolute;
            bottom: -5%;
            right: -5%;
            width: 600px;
            height: 600px;
            background: url('https://images-ext-1.discordapp.net/external/gJBPJR2l6wnD0Ct16DG-IH5gsZ9SnnungVvHXJC3XCk/%3Fsize%3D1024/https/cdn.discordapp.com/icons/1477716001951973447/74bcfcea71140d9cba216a1259840bcf.png?format=webp&quality=lossless&width=551&height=551') no-repeat center;
            background-size: contain;
            opacity: 0.05;
            filter: grayscale(1);
            pointer-events: none;
            z-index: -1;
        }

        /* --- Barra de Estado Superior --- */
        .top-status {
            position: absolute;
            top: 30px;
            left: 40px;
            font-size: 14px;
            font-weight: 600;
            color: var(--mdt-text-dim);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .header-status {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #ef4444;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Contenedor Principal (Estilo Tarjeta Moderna) --- */
        .login-panel {
            background: var(--mdt-panel);
            border: 1px solid var(--mdt-border);
            backdrop-filter: blur(20px);
            padding: 60px 50px;
            border-radius: 16px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 440px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .login-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--mdt-blue), transparent);
        }

        .icon-container {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .icon-container svg,
        .icon-container img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(59, 130, 246, 0.4);
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
            transition: transform 0.3s ease;
        }

        h1 {
            color: var(--mdt-text);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--mdt-blue);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* --- Texto de Instrucciones --- */
        .instructions {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 40px;
            color: var(--mdt-text-dim);
            background: rgba(0, 0, 0, 0.25);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* --- Botón Discord Elegante --- */
        .discord-btn {
            background: rgba(59, 130, 246, 0.1);
            color: var(--mdt-text);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .discord-btn:hover {
            background: var(--mdt-blue);
            border-color: var(--mdt-blue);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* --- Créditos --- */
        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(148, 163, 184, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="top-status">
        <div class="status-dot"></div>
        MDT Version: 3.1.2 // Status: ONLINE
    </div>

    <div class="header-status">
        OUT OF DUTY
    </div>

    <div class="login-panel">

        <div class="icon-container">
            <img src="https://images-ext-1.discordapp.net/external/gJBPJR2l6wnD0Ct16DG-IH5gsZ9SnnungVvHXJC3XCk/%3Fsize%3D1024/https/cdn.discordapp.com/icons/1477716001951973447/74bcfcea71140d9cba216a1259840bcf.png?format=webp&quality=lossless&width=551&height=551"
                alt="MDT PDI Logo">
        </div>

        <h1>MDT - PDI DE CHILE</h1>
        <div class="subtitle">Departamento de Inteligencia</div>

        <div class="instructions">
            SISTEMA DE ACCESO RESTRINGIDO. Ingrese sus credenciales institucionales para acceder a la base de datos
            central.
        </div>

        <button class="discord-btn" onclick="iniciarConexion()">
            <svg class="discord-icon" viewBox="0 0 127.14 96.36">
                <path
                    d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a67.55,67.55,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.51-51.11-19.32-72.15ZM42.68,65.36c-5.22,0-9.49-4.82-9.49-10.74s4.21-10.74,9.49-10.74,9.55,4.84,9.49,10.74C52.17,60.54,47.94,65.36,42.68,65.36Zm41.72,0c-5.22,0-9.49-4.82-9.49-10.74s4.21-10.74,9.49-10.74,9.55,4.84,9.49,10.74C93.9,60.54,89.67,65.36,84.4,65.36Z" />
            </svg>
            Iniciar Sesión
        </button>

        <div class="footer-text">
            Propiedad de Smile © 2026
        </div>

    </div>

    <script>
        function iniciarConexion() {
            const clientId = "1477874259966562417";
            const redirectUri = encodeURIComponent("https://mdt-pdi.netlify.app/verificando");
            const scopes = encodeURIComponent("identify guilds guilds.members.read");
            const discordLoginUrl = `https://discord.com/oauth2/authorize?client_id=${clientId}&response_type=token&redirect_uri=${redirectUri}&scope=${scopes}`;

            window.location.href = discordLoginUrl;
        }
    </script>

</body>

</html>
