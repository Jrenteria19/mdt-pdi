<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificando Credenciales | MDT PDI</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #10141d;
            color: #00f2fe;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .loader {
            border: 4px solid rgba(0, 242, 254, 0.2);
            border-top: 4px solid #00f2fe;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #00f2fe;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #mensaje {
            font-size: 18px;
            letter-spacing: 2px;
        }

        .error {
            color: #ff3b3b;
            border: 1px solid #ff3b3b;
            padding: 20px;
            background: rgba(255, 59, 59, 0.1);
        }
    </style>
</head>

<body>

    <div class="loader" id="spinner"></div>
    <div id="mensaje">Conectando con la base de datos central... Extrayendo placa...</div>

    <script>
        // 1. Configuraciones
        const ID_SERVIDOR = "TU_ID_DEL_SERVIDOR_AQUI"; // <--- PON LA ID DE TU SERVIDOR AQUÍ
        const ID_ROL_PDI = "1477716001989595176";

        window.onload = async () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const [accessToken, tokenType] = [fragment.get('access_token'), fragment.get('token_type')];

            if (!accessToken) {
                mostrarError("ACCESO DENEGADO: No se recibió autorización de Discord.");
                return;
            }

            document.getElementById('mensaje').innerText = "Verificando credenciales y roles...";

            try {
                // 2. Preguntamos a Discord por los datos de este usuario en tu servidor
                const respuesta = await fetch(`https://discord.com/api/users/@me/guilds/${ID_SERVIDOR}/member`, {
                    headers: { authorization: `${tokenType} ${accessToken}` }
                });

                if (respuesta.status === 404) {
                    mostrarError("ACCESO DENEGADO: No eres miembro del servidor oficial de ChileVerse RP.");
                    return;
                }

                if (!respuesta.ok) {
                    throw new Error("Error de conexión con la API.");
                }

                const datosMiembro = await respuesta.json();

                // 3. Verificamos si tiene el rol de la PDI
                if (datosMiembro.roles.includes(ID_ROL_PDI)) {
                    document.getElementById('spinner').style.borderTopColor = "#00ff00";
                    document.getElementById('mensaje').style.color = "#00ff00";
                    document.getElementById('mensaje').innerText = "¡AUTORIZACIÓN CONFIRMADA! Entrando a la MDT...";

                    // Aquí lo mandaremos al panel real (Lo crearemos en el próximo paso)
                    setTimeout(() => {
                        window.location.href = "panel.html";
                    }, 2000);
                } else {
                    mostrarError("ACCESO DENEGADO: Tu perfil no cuenta con la placa oficial de la PDI (Rol no encontrado).");
                }

            } catch (error) {
                mostrarError("ACCESO DENEGADO: " + error.message);
            }
        };

        function mostrarError(texto) {
            document.getElementById('spinner').style.display = 'none';
            const msj = document.getElementById('mensaje');
            msj.className = 'error';
            msj.innerHTML = texto + "<br><br><a href='index.html' style='color:#ff3b3b;'>[ Volver al Inicio ]</a>";
        }
    </script>
</body>

</html>
